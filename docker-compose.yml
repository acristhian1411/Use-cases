version: "3.9"

services:
  use_cases:
    build:
      context: .
      args:
        CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:81,http://127.0.0.1:81,http://192.168.0.14:81}
    container_name: use_cases
    ports:
      - "81:3000" # Puerto externo → interno
    restart: always
    volumes:
      - ./sqlite.db:/app/sqlite.db # Monta el archivo DB
    extra_hosts:
      - "auth.test:host-gateway"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=file:/app/sqlite.db
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:81,http://127.0.0.1:81,http://192.168.0.14:81}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
